<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTherapist — Skor Kartım</title>
  <link rel="stylesheet" href="scorecard.css">
</head>
<body>
  <div class="card-container">
    <p class="page-title">Skor Kartın Hazır 🛋️</p>

    <div class="canvas-wrapper">
      <canvas id="shareCanvas" width="1080" height="1080"></canvas>
    </div>

    <div class="btn-group">
      <button class="btn btn-download" id="btnDownload">⬇ PNG Olarak İndir</button>
      <button class="btn btn-x" id="btnShareX">X'te Paylaş</button>
      <button class="btn btn-linkedin" id="btnShareLinkedIn">LinkedIn'de Paylaş</button>
    </div>
  </div>

  <script src="scorecard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTherapist</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🛋️</span>
        <div class="logo-text">
          <h1 class="app-title">TabTherapist</h1>
          <p class="app-tagline">Sekme Psikoloji Kliniği</p>
        </div>
      </div>
    </header>

    <!-- MAIN: Skor Dairesi + Badge -->
    <main class="main">

      <div class="score-section">
        <div class="score-ring-wrapper">
          <svg class="score-ring" viewBox="0 0 120 120" width="140" height="140">
            <circle class="ring-bg" cx="60" cy="60" r="52" />
            <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="52" />
          </svg>
          <div class="score-center">
            <span class="score-value" id="scoreValue">--</span>
            <span class="score-label">/ 100</span>
          </div>
        </div>
        <div class="personality-badge" id="personalityBadge">
          <span id="personalityLabel">Yükleniyor...</span>
        </div>
      </div>

      <!-- STATS -->
      <section class="stats-section">
        <div class="stat-card">
          <span class="stat-number" id="statTabs">--</span>
          <span class="stat-desc">Sekme</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statWindows">--</span>
          <span class="stat-desc">Pencere</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statDuplicates">--</span>
          <span class="stat-desc">Kopya</span>
        </div>
      </section>

      <!-- SHARE -->
      <button class="share-btn" id="shareBtn">
        📤 Sonucumu Paylaş
      </button>

      <!-- ACTIONS -->
      <section class="actions-section">
        <button class="action-btn danger" id="btnCloseAncient">
          🗑️ Eski Sekmeleri Kapat
        </button>
        <button class="action-btn warning" id="btnMergeDuplicates">
          🔗 Kopyaları Birleştir
        </button>
        <button class="action-btn calm" id="btnArchive">
          📦 Arşivle
        </button>
      </section>

    </main>

    <footer class="footer">
      <span>TabTherapist v1.0.0</span>
    </footer>

  </div>
  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal-box">
      <p class="modal-message" id="modalMessage"></p>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancel">İptal</button>
        <button class="modal-btn confirm" id="modalConfirm">Evet, Yap</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Browser tabs (teal) — floating above couch -->
  <rect x="36" y="18" width="32" height="17" rx="6" fill="#4ecdc4"/>
  <rect x="72" y="22" width="28" height="13" rx="5" fill="#4ecdc4" opacity="0.55"/>

  <!-- Therapy couch (amber/gold) -->
  <!-- Backrest — left vertical pillar -->
  <rect x="18" y="35" width="18" height="57" rx="9" fill="#e2b714"/>
  <!-- Seat — wide horizontal bar -->
  <rect x="18" y="70" width="92" height="22" rx="11" fill="#e2b714"/>
  <!-- Right armrest -->
  <rect x="92" y="62" width="18" height="30" rx="9" fill="#e2b714"/>

  <!-- Legs -->
  <rect x="24" y="90" width="7" height="16" rx="3" fill="#e2b714" opacity="0.55"/>
  <rect x="97" y="90" width="7" height="16" rx="3" fill="#e2b714" opacity="0.55"/>
</svg>
